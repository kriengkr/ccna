<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จำลองข้อสอบ CCNA - เลือกชุดข้อสอบ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0faf8;
      --card: #ffffff;
      --accent: #0d9488;
      --accent-hover: #22d3b3;
      --text: #134e4a;
      --text-muted: #5b7c78;
      --border: #99d4ce;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent);
    }
    header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 0.25rem;
    }
    .sets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .set-card {
      display: block;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1rem;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
      font-size: 1.05rem;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
    }
    .set-card:hover {
      border-color: var(--accent);
      background: rgba(13, 148, 136, 0.06);
      transform: translateY(-2px);
    }
    .set-card .num {
      display: block;
      font-size: 1.5rem;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }
    .set-card .label {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>จำลองข้อสอบ CCNA</h1>
      <p>เลือกชุดข้อสอบที่ต้องการทำ (ชุดที่ 1–25)</p>
    </header>
    <div class="sets-grid" id="sets-grid"></div>
  </div>
  <script>
    const totalSets = 25;
    const grid = document.getElementById('sets-grid');
    for (let i = 1; i <= totalSets; i++) {
      const a = document.createElement('a');
      a.href = 'exam.html?set=' + i;
      a.className = 'set-card';
      a.innerHTML = '<span class="num">ชุดที่ ' + i + '</span><span class="label">คลิกเพื่อเริ่มทำข้อสอบ</span>';
      grid.appendChild(a);
    }
  </script>
</body>
</html>
